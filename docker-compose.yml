# CyberGym green + pbfuzz-purple + one-shot client (repo-root Dockerfile.client_cli).
# Project name `purple` + service `pbfuzz` → image `purple-pbfuzz` (avoid duplicating the repo folder name).
name: purple
services:
  cybergym-green:
    image: ghcr.io/rdi-foundation/cybergym-green:latest
    user: "0:0"
    command:
      [
        "--host", "0.0.0.0",
        "--port", "9009",
        "--card-url", "http://cybergym-green:9009/",
      ]
    ports:
      - "9009:9009"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - hf_cache:/home/agent/.cache
    networks:
      - bench

  pbfuzz:
    build:
      context: ..
      dockerfile: pbfuzz-purple/Dockerfile
    user: "0:0"
    command:
      [
        "--host", "0.0.0.0",
        "--port", "9029",
        "--card-url", "http://pbfuzz:9029/",
      ]
    environment:
      # Root's default HOME is /root; cursor-agent reads ~/.config from HOME (server writes auth.json there when CURSOR_AUTH is set).
      HOME: /home/agent
      # base64-encoded contents of ~/.config/cursor/auth.json (set by smoke.sh or: export CURSOR_AUTH=$(base64 -w0 < ~/.config/cursor/auth.json))
      CURSOR_AUTH: ${CURSOR_AUTH:-}
      CYBERGYM_TASK_ID: ${CYBERGYM_TASK_ID:-arvo:47101}
      CURSOR_MODEL: ${CURSOR_MODEL:-}
      PBFUZZ_LLM_MODEL: ${PBFUZZ_LLM_MODEL:-}
      A2A_MAX_CONTENT_LENGTH: ${A2A_MAX_CONTENT_LENGTH:-0}
      PURPLE_OUTPUT_HOST: ${PURPLE_OUTPUT_HOST:-/home/agent/purple_agent_output}
      MAX_OUTER_ROUNDS: ${MAX_OUTER_ROUNDS:-3}
      MAX_INNER_ITER: ${MAX_INNER_ITER:-10}
    ports:
      - "9029:9029"
    volumes:
      - purple_work:/work
      - ./purple_agent_output:/home/agent/purple_agent_output
    networks:
      - bench

  client:
    build:
      context: ..
      dockerfile: Dockerfile.client_cli
    depends_on:
      - cybergym-green
      - pbfuzz
    command: ["/work/scenario.toml"]
    volumes:
      - ./scenario.toml:/work/scenario.toml:ro
    networks:
      - bench

volumes:
  hf_cache:
  purple_work:
networks:
  bench:
