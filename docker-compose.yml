# CyberGym green agent, cursor-cli-purple, and a one-shot repo-root client (Dockerfile.client_cli).
services:
  cybergym-green:
    image: ghcr.io/rdi-foundation/cybergym-green:latest
    # Named volumes are often root-owned; green needs ~/.cache/uv + HF hub under ~/.cache.
    user: "0:0"
    command:
      [
        "--host",
        "0.0.0.0",
        "--port",
        "9009",
        "--card-url",
        "http://cybergym-green:9009/",
      ]
    ports:
      - "9009:9009"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - hf_cache:/home/agent/.cache
    networks:
      - bench

  cursor-cli-purple:
    build: .
    user: "0:0"
    command:
      [
        "--host",
        "0.0.0.0",
        "--port",
        "9019",
        "--card-url",
        "http://cursor-cli-purple:9019/",
      ]
    environment:
      # Root's default HOME is /root; cursor-agent reads ~/.config from HOME (server writes auth.json there when CURSOR_AUTH is set).
      HOME: /home/agent
      # base64-encoded contents of ~/.config/cursor/auth.json (set by smoke.sh or: export CURSOR_AUTH=$(base64 -w0 < ~/.config/cursor/auth.json))
      CURSOR_AUTH: ${CURSOR_AUTH:-}
      CURSOR_MODEL: ${CURSOR_MODEL:-claude-4.5-sonnet}
      MAX_ITER: ${MAX_ITER:-5}
      A2A_MAX_CONTENT_LENGTH: ${A2A_MAX_CONTENT_LENGTH:-0}
      PURPLE_OUTPUT_HOST: ${PURPLE_OUTPUT_HOST:-off}
    ports:
      - "9019:9019"
    volumes:
      - purple_work:/work
      # Human-readable mirror of each context workspace (see README).
      - ./purple_agent_output:/home/agent/purple_agent_output
    networks:
      - bench

  client:
    build:
      context: ..
      dockerfile: Dockerfile.client_cli
    depends_on:
      - cybergym-green
      - cursor-cli-purple
    command: ["/work/scenario.toml"]
    volumes:
      - ./scenario.toml:/work/scenario.toml:ro
    networks:
      - bench

volumes:
  hf_cache:
  purple_work:
networks:
  bench:
